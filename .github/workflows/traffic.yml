name: GitHub Traffic Archive

on:
  schedule:
    - cron: '0 20 * * *' # 北京時間凌晨 4 點運行
  workflow_dispatch:      # 允許手動測試

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Traffic Statistics
        uses: teoxoy/profile-views-stats@v1
        with:
          # 這裡使用您存放在 Secrets 裡的那個 Token
          token: ${{ secrets.TRAFFIC_TOKEN }}

      - name: Commit and Push
        run: |
          git config --global user.name "Traffic-Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Daily traffic update" || exit 0
          git push
